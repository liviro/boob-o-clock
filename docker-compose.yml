services:
  boob-o-clock:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - boc-data:/data
    environment:
      # Opt-in sleep-training modes. Default off; set "true" to expose the UI
      # (Start Night toggle + history charts + detail stats). Flip and
      # `docker compose up -d` to apply — no image rebuild needed.
      FERBER_ENABLED: "false"

volumes:
  boc-data:
