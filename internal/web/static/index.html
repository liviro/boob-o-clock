<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Boob O'Clock</title>
<link rel="manifest" href="/manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: 12px; padding-top: env(safe-area-inset-top, 12px);
    padding-bottom: env(safe-area-inset-bottom, 12px);
    -webkit-user-select: none; user-select: none;
  }

  /* Tab bar */
  #tabs {
    display: flex; gap: 0; margin-bottom: 8px;
    border-bottom: 1px solid #222;
  }
  .tab {
    flex: 1; background: none; border: none; color: #666;
    font-size: 13px; font-weight: 600; padding: 8px 0;
    cursor: pointer; text-align: center;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: #fff; border-bottom-color: #fff; }

  /* Tracker page */
  #page-tracker, #page-history { display: none; flex-direction: column; flex: 1; }
  #page-tracker.active, #page-history.active { display: flex; }

  #status {
    text-align: center; padding: 12px 0 4px;
  }
  #state-icon { font-size: 48px; display: block; margin-bottom: 4px; }
  #state-label { font-size: 18px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  #timer { font-size: 14px; color: #666; margin-top: 4px; }

  #actions {
    flex: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-content: start;
    padding: 12px 0;
  }

  .action-btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 12px;
    font-size: 15px; font-weight: 600;
    min-height: 64px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .action-btn:active { background: #333; }
  .action-btn .icon { font-size: 24px; }

  .action-btn.primary { background: #1a3a1a; border-color: #2a5a2a; }
  .action-btn.danger { background: #3a1a1a; border-color: #5a2a2a; }
  .action-btn.feed { background: #3a2a1a; border-color: #5a4a2a; }
  .action-btn.sleep { background: #1a1a3a; border-color: #2a2a5a; }
  .action-btn.full-width { grid-column: 1 / -1; }

  #bottom-bar {
    display: flex; gap: 10px;
    padding-top: 8px;
    border-top: 1px solid #222;
  }

  #undo-btn {
    flex: 1;
    background: #111; color: #888;
    border: 1px solid #222; border-radius: 10px;
    font-size: 13px; min-height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #undo-btn:active { background: #222; }
  #undo-btn:disabled { opacity: 0.3; }

  /* Modals */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 20px;
  }
  .modal.open { display: flex; }
  .modal h3 { font-size: 16px; color: #aaa; }
  .modal-cancel { background: none; color: #888; border: none; font-size: 14px; margin-top: 8px; cursor: pointer; }

  .ts-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; max-width: 300px;
  }
  .ts-btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 10px;
    font-size: 16px; font-weight: 600;
    min-height: 56px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .ts-btn:active { background: #333; }
  .ts-btn.now { background: #1a3a1a; border-color: #2a5a2a; grid-column: 1 / -1; }

  .breast-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; max-width: 300px;
  }
  .breast-btn {
    background: #3a2a1a; color: #fff;
    border: 2px solid #5a4a2a; border-radius: 16px;
    font-size: 28px; font-weight: 700;
    min-height: 100px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .breast-btn:active { background: #5a4a2a; }

  /* Confirm modal */
  .confirm-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; width: 100%; max-width: 300px;
  }
  .confirm-btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 10px;
    font-size: 16px; font-weight: 600;
    min-height: 56px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-btn:active { background: #333; }
  .confirm-btn.yes { background: #3a1a1a; border-color: #5a2a2a; }
  .confirm-btn.no { background: #1a1a1a; border-color: #333; }

  /* History page */
  #history-content { flex: 1; overflow-y: auto; }

  .night-card {
    background: #111; border: 1px solid #222; border-radius: 12px;
    padding: 14px; margin-bottom: 12px;
  }
  .night-card h3 {
    font-size: 14px; color: #aaa; margin-bottom: 10px;
    display: flex; justify-content: space-between;
  }
  .night-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 12px;
  }
  .stat { text-align: center; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #666; text-transform: uppercase; }

  /* Timeline bar */
  .timeline-bar {
    display: flex; height: 24px; border-radius: 6px; overflow: hidden;
    margin-bottom: 6px;
  }
  .tl-segment { min-width: 2px; }
  .tl-segment.awake { background: #5a2a2a; }
  .tl-segment.feeding { background: #8a6a2a; }
  .tl-segment.sleeping_on_me { background: #2a2a5a; }
  .tl-segment.sleeping_crib { background: #1a3a6a; }
  .tl-segment.sleeping_stroller { background: #2a4a5a; }
  .tl-segment.resettling { background: #3a3a5a; }
  .tl-segment.strolling { background: #3a4a3a; }
  .tl-segment.transferring { background: #444; }
  .tl-segment.poop { background: #5a4a2a; }

  .timeline-legend {
    display: flex; flex-wrap: wrap; gap: 8px; font-size: 10px; color: #666;
  }
  .legend-item { display: flex; align-items: center; gap: 3px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .no-data { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }

  /* Toast */
  #error-toast {
    display: none;
    position: fixed; bottom: 80px; left: 12px; right: 12px;
    background: #5a2a2a; color: #fff;
    border-radius: 8px; padding: 12px; text-align: center;
    font-size: 14px; z-index: 200;
  }
  #error-toast.show { display: block; }
</style>
</head>
<body>

<div id="tabs">
  <button class="tab active" onclick="showPage('tracker')">Tracker</button>
  <button class="tab" onclick="showPage('history')">History</button>
</div>

<div id="page-tracker" class="active">
  <div id="status">
    <span id="state-icon"></span>
    <span id="state-label">loading...</span>
    <div id="timer"></div>
  </div>

  <div id="actions"></div>

  <div id="bottom-bar">
    <button id="undo-btn" disabled>↩ Undo</button>
  </div>
</div>

<div id="page-history">
  <div id="history-content">
    <div class="no-data">Loading...</div>
  </div>
</div>

<!-- Timestamp modal -->
<div id="ts-modal" class="modal">
  <h3 id="ts-title">When?</h3>
  <div class="ts-grid">
    <button class="ts-btn now" onclick="confirmTimestamp(0)">Now</button>
    <button class="ts-btn" onclick="confirmTimestamp(-1)">1 min ago</button>
    <button class="ts-btn" onclick="confirmTimestamp(-5)">5 min ago</button>
    <button class="ts-btn" onclick="confirmTimestamp(-10)">10 min ago</button>
    <button class="ts-btn" onclick="confirmTimestamp(-15)">15 min ago</button>
  </div>
  <button class="modal-cancel" onclick="cancelAction()">Cancel</button>
</div>

<!-- Breast picker modal -->
<div id="breast-modal" class="modal">
  <h3>Which side?</h3>
  <div class="breast-grid">
    <button class="breast-btn" onclick="pickBreast('L')">L</button>
    <button class="breast-btn" onclick="pickBreast('R')">R</button>
  </div>
  <button class="modal-cancel" onclick="cancelAction()">Cancel</button>
</div>

<!-- Confirm modal (for End Night) -->
<div id="confirm-modal" class="modal">
  <h3 id="confirm-title">Are you sure?</h3>
  <div class="confirm-grid">
    <button class="confirm-btn no" onclick="cancelAction()">No</button>
    <button class="confirm-btn yes" id="confirm-yes-btn">Yes</button>
  </div>
</div>

<div id="error-toast"></div>

<script>
const API = '/api';
let currentState = null;
let pendingAction = null;
let pendingMetadata = null;
let stateStartTime = null;
let timerInterval = null;
let currentNightId = null;

const STATE_INFO = {
  night_off:         { icon: '🌙', label: 'Night Off' },
  awake:             { icon: '👀', label: 'Awake' },
  feeding:           { icon: '🍼', label: 'Feeding' },
  sleeping_on_me:    { icon: '🤱', label: 'Sleeping on Me' },
  transferring:      { icon: '🤞', label: 'Transferring...' },
  resettling:        { icon: '🤚', label: 'Resettling' },
  sleeping_crib:     { icon: '😴', label: 'Sleeping in Crib' },
  strolling:         { icon: '🚶', label: 'Strolling' },
  sleeping_stroller: { icon: '💤', label: 'Sleeping in Stroller' },
  poop:              { icon: '💩', label: 'Diaper Change' },
};

const ACTION_INFO = {
  start_night:           { icon: '🌙', label: 'Start Night', cls: 'primary full-width' },
  start_feed:            { icon: '🍼', label: 'Feed', cls: 'feed', needsBreast: true },
  dislatch_awake:        { icon: '👀', label: 'Dislatch\n(awake)', cls: '' },
  dislatch_asleep:       { icon: '😴', label: 'Dislatch\n(asleep)', cls: 'sleep' },
  switch_breast:         { icon: '🔄', label: 'Switch\nSide', cls: 'feed', needsBreast: true },
  start_transfer:        { icon: '🤞', label: 'Transfer\nto Crib', cls: '' },
  transfer_success:      { icon: '😴', label: 'Asleep\nin Crib!', cls: 'sleep' },
  transfer_need_resettle:{ icon: '🤚', label: 'Needs\nResettle', cls: '' },
  transfer_failed:       { icon: '❌', label: 'Transfer\nFailed', cls: 'danger' },
  start_resettle:        { icon: '🤚', label: 'Resettle', cls: '' },
  settled:               { icon: '😴', label: 'Settled!', cls: 'sleep' },
  resettle_failed:       { icon: '❌', label: 'Resettle\nFailed', cls: 'danger' },
  baby_woke:             { icon: '👀', label: 'Baby\nWoke', cls: 'danger' },
  start_strolling:       { icon: '🚶', label: 'Stroller', cls: '' },
  fell_asleep:           { icon: '💤', label: 'Fell\nAsleep!', cls: 'sleep' },
  give_up:               { icon: '🏳️', label: 'Give Up', cls: 'danger' },
  poop_start:            { icon: '💩', label: 'Poop!', cls: '' },
  poop_done:             { icon: '✅', label: 'Poop\nDone', cls: 'primary full-width' },
  end_night:             { icon: '☀️', label: 'End Night', cls: 'danger full-width', confirm: true },
};

const ACTIONS_NEEDING_CONFIRM = new Set(['end_night']);

// -- Page navigation --
function showPage(page) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${page}"]`).classList.add('active');
  document.getElementById(`page-${page}`).classList.add('active');
  if (page === 'history') loadHistory();
}

// -- Tracker --
async function loadSession() {
  try {
    const resp = await fetch(`${API}/session/current`);
    const data = await resp.json();
    render(data);
  } catch (e) {
    showError('Failed to connect to server');
  }
}

function render(session) {
  currentState = session.state;
  currentNightId = session.nightId;
  const info = STATE_INFO[session.state] || { icon: '?', label: session.state };

  document.getElementById('state-icon').textContent = info.icon;
  document.getElementById('state-label').textContent = info.label;

  // Update timer
  if (timerInterval) clearInterval(timerInterval);
  if (session.lastEvent && session.state !== 'night_off') {
    stateStartTime = new Date(session.lastEvent.timestamp);
    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
  } else {
    document.getElementById('timer').textContent = '';
    stateStartTime = null;
  }

  // Render action buttons
  const grid = document.getElementById('actions');
  grid.innerHTML = '';
  for (const action of session.validActions) {
    const ai = ACTION_INFO[action] || { icon: '?', label: action, cls: '' };
    const btn = document.createElement('button');
    btn.className = `action-btn ${ai.cls}`;
    btn.innerHTML = `<span class="icon">${ai.icon}</span>${ai.label.replace(/\n/g, '<br>')}`;
    btn.onclick = () => startAction(action);
    grid.appendChild(btn);
  }

  // Undo button
  const undoBtn = document.getElementById('undo-btn');
  if (session.lastEvent) {
    const la = ACTION_INFO[session.lastEvent.action];
    undoBtn.textContent = `↩ Undo: ${la ? la.label.replace(/\n/g, ' ') : session.lastEvent.action}`;
    undoBtn.disabled = false;
  } else {
    undoBtn.textContent = '↩ Undo';
    undoBtn.disabled = true;
  }
}

function updateTimer() {
  if (!stateStartTime) return;
  const diff = Math.floor((Date.now() - stateStartTime.getTime()) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  let text = '';
  if (h > 0) text = `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  else text = `${m}:${s.toString().padStart(2, '0')}`;
  document.getElementById('timer').textContent = text + ' in this state';
}

function startAction(action) {
  const ai = ACTION_INFO[action];

  // Confirmation for dangerous actions
  if (ACTIONS_NEEDING_CONFIRM.has(action)) {
    pendingAction = action;
    pendingMetadata = null;
    document.getElementById('confirm-title').textContent =
      `${ai.icon} ${ai.label.replace(/\n/g, ' ')} — are you sure?`;
    document.getElementById('confirm-yes-btn').onclick = () => {
      document.getElementById('confirm-modal').classList.remove('open');
      showTimestampPicker(action, null);
    };
    document.getElementById('confirm-modal').classList.add('open');
    return;
  }

  if (ai && ai.needsBreast) {
    pendingAction = action;
    document.getElementById('breast-modal').classList.add('open');
    return;
  }

  showTimestampPicker(action, null);
}

function showTimestampPicker(action, metadata) {
  pendingAction = action;
  pendingMetadata = metadata;
  const ai = ACTION_INFO[action];
  let title = ai ? ai.label.replace(/\n/g, ' ') : action;
  if (metadata && metadata.breast) title += ` (${metadata.breast})`;
  document.getElementById('ts-title').textContent = title + ' — When?';
  document.getElementById('ts-modal').classList.add('open');
}

function pickBreast(side) {
  document.getElementById('breast-modal').classList.remove('open');
  showTimestampPicker(pendingAction, { breast: side });
}

function cancelAction() {
  pendingAction = null;
  pendingMetadata = null;
  document.getElementById('ts-modal').classList.remove('open');
  document.getElementById('breast-modal').classList.remove('open');
  document.getElementById('confirm-modal').classList.remove('open');
}

async function confirmTimestamp(minutesAgo) {
  document.getElementById('ts-modal').classList.remove('open');
  const ts = new Date(Date.now() + minutesAgo * 60000);
  await sendEvent(pendingAction, pendingMetadata, ts);
  pendingAction = null;
  pendingMetadata = null;
}

async function sendEvent(action, metadata, timestamp) {
  try {
    const body = { action };
    if (metadata) body.metadata = metadata;
    if (timestamp) body.timestamp = timestamp.toISOString();

    const resp = await fetch(`${API}/session/event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.json();
      showError(err.error || 'Request failed');
      return;
    }

    const data = await resp.json();
    render(data);
    if (navigator.vibrate) navigator.vibrate(10);
  } catch (e) {
    showError('Failed to connect to server');
  }
}

document.getElementById('undo-btn').onclick = async () => {
  try {
    const resp = await fetch(`${API}/session/undo`, { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json();
      showError(err.error || 'Undo failed');
      return;
    }
    const data = await resp.json();
    render(data);
    if (navigator.vibrate) navigator.vibrate([10, 50, 10]);
  } catch (e) {
    showError('Failed to connect to server');
  }
};

// -- History --
async function loadHistory() {
  const content = document.getElementById('history-content');
  try {
    const resp = await fetch(`${API}/nights`);
    const data = await resp.json();

    if (!data.nights || data.nights.length === 0) {
      content.innerHTML = '<div class="no-data">No nights recorded yet</div>';
      return;
    }

    // Reverse to show most recent first
    const nights = data.nights.reverse();
    content.innerHTML = '';

    for (const n of nights) {
      const card = document.createElement('div');
      card.className = 'night-card';
      card.onclick = () => showNightDetail(n.id);

      const date = new Date(n.startedAt);
      const dateStr = date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

      const s = n.stats;
      card.innerHTML = `
        <h3><span>${dateStr}</span><span>${timeStr}</span></h3>
        <div class="night-stats">
          <div class="stat">
            <div class="stat-value">${fmtDur(s.longestSleepBlock)}</div>
            <div class="stat-label">Longest Sleep</div>
          </div>
          <div class="stat">
            <div class="stat-value">${s.wakeCount}</div>
            <div class="stat-label">Wakes</div>
          </div>
          <div class="stat">
            <div class="stat-value">${s.feedCount}</div>
            <div class="stat-label">Feeds</div>
          </div>
          <div class="stat">
            <div class="stat-value">${fmtDur(s.totalSleepTime)}</div>
            <div class="stat-label">Total Sleep</div>
          </div>
        </div>
      `;

      content.appendChild(card);
    }
  } catch (e) {
    content.innerHTML = '<div class="no-data">Failed to load history</div>';
  }
}

async function showNightDetail(nightId) {
  const content = document.getElementById('history-content');
  try {
    const resp = await fetch(`${API}/nights/${nightId}`);
    const data = await resp.json();

    const night = data.night;
    const s = data.stats;
    const tl = data.timeline || [];

    const date = new Date(night.startedAt);
    const dateStr = date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

    // Calculate total duration for proportional timeline bar
    const totalNs = s.nightDuration; // in nanoseconds from Go
    const totalMs = totalNs / 1e6;

    let html = `
      <div style="margin-bottom: 12px;">
        <button class="modal-cancel" onclick="loadHistory()" style="font-size: 16px; padding: 4px 0;">← Back</button>
      </div>
      <div class="night-card">
        <h3><span>${dateStr}</span><span>${fmtDur(s.nightDuration)}</span></h3>
        <div class="night-stats">
          <div class="stat">
            <div class="stat-value">${fmtDur(s.longestSleepBlock)}</div>
            <div class="stat-label">Longest Sleep</div>
          </div>
          <div class="stat">
            <div class="stat-value">${s.wakeCount}</div>
            <div class="stat-label">Wakes</div>
          </div>
          <div class="stat">
            <div class="stat-value">${fmtDur(s.totalFeedTime)}</div>
            <div class="stat-label">Feed Time</div>
          </div>
          <div class="stat">
            <div class="stat-value">${fmtDur(s.totalSleepTime)}</div>
            <div class="stat-label">Total Sleep</div>
          </div>
        </div>
        <div class="timeline-bar">
    `;

    for (const entry of tl) {
      const pct = totalMs > 0 ? (entry.duration / 1e6 / totalMs * 100) : 0;
      if (pct < 0.5) continue; // skip tiny segments
      html += `<div class="tl-segment ${entry.state}" style="width:${pct}%" title="${entry.state}: ${fmtDur(entry.duration)}"></div>`;
    }

    html += `</div>
        <div class="timeline-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#1a3a6a"></div>Crib</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2a4a5a"></div>Stroller</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2a2a5a"></div>On Me</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8a6a2a"></div>Feed</div>
          <div class="legend-item"><div class="legend-dot" style="background:#5a2a2a"></div>Awake</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3a3a5a"></div>Resettle</div>
        </div>
      </div>
    `;

    // Event log
    html += '<div class="night-card"><h3><span>Event Log</span></h3><div style="font-size: 12px; color: #888;">';
    for (const evt of data.events) {
      const t = new Date(evt.timestamp).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      const ai = ACTION_INFO[evt.action];
      const label = ai ? `${ai.icon} ${ai.label.replace(/\n/g, ' ')}` : evt.action;
      const meta = evt.metadata ? ` (${Object.values(evt.metadata).join(', ')})` : '';
      html += `<div style="padding: 3px 0; border-bottom: 1px solid #1a1a1a;">${t} — ${label}${meta}</div>`;
    }
    html += '</div></div>';

    content.innerHTML = html;
  } catch (e) {
    showError('Failed to load night detail');
  }
}

// -- Utilities --
function fmtDur(ns) {
  // Go durations come as nanoseconds in JSON
  const totalMin = Math.floor(ns / 1e9 / 60);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h > 0) return `${h}h${m > 0 ? m + 'm' : ''}`;
  return `${m}m`;
}

function showError(msg) {
  const toast = document.getElementById('error-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Boot
loadSession();
</script>
